# ClawHub registry monitor.
#
# Runs `malwar crawl monitor` on a schedule and commits the snapshot + diff to
# the `registry-snapshots` branch so `git log -p registry-snapshots` is a
# permanent, auditable record of what changed day over day.
#
# Two cadences:
#   * Daily (06:00 UTC) — INCREMENTAL. Only skills whose version/updated_at
#     changed since the last snapshot are re-fetched, re-scanned, and (if
#     flagged) escalated to the LLM. The first run scans everything; every run
#     after is cheap and fast.
#   * Weekly (Sunday 07:00 UTC) — FULL (`--full`). Re-scans every skill to catch
#     silent same-version content swaps (trojanized updates that keep the same
#     version number), which incremental detection would otherwise miss.
#
# Why a dedicated branch and not `main`? `main` is protected (PR + required
# checks), so a scheduled bot cannot push to it. The snapshot history therefore
# lives on its own long-running `registry-snapshots` branch, created
# automatically on the first run.
#
# The LLM escalation needs an Anthropic API key. Add it as a *repository* secret
# named MALWAR_ANTHROPIC_API_KEY (Settings -> Secrets and variables -> Actions ->
# New repository secret). Without it the sweep still runs on the rule engine +
# threat intel; only the LLM second opinion on flagged skills is skipped.

name: Registry Monitor

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC — incremental
    - cron: "0 7 * * 0" # Sunday 07:00 UTC — full re-scan
  workflow_dispatch: # manual "run now" from the Actions tab
    inputs:
      full:
        description: "Force a full re-scan of every skill"
        type: boolean
        default: false

# Never let two sweeps race on the snapshot history / the push.
concurrency:
  group: registry-monitor
  cancel-in-progress: false

permissions:
  contents: write # push snapshots to the registry-snapshots branch

jobs:
  monitor:
    name: Sweep registry and commit report
    runs-on: ubuntu-latest
    # The weekly full re-scan is the long pole; incremental daily runs finish
    # far sooner once the baseline exists.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install malwar
        run: pip install -e "."

      - name: Restore snapshot baseline from data branch
        run: |
          mkdir -p data/registry-snapshots
          # Start clean so a stale/empty baseline can never reach the monitor.
          rm -f data/registry-snapshots/latest.json
          # Only write the baseline when the data branch AND the file both exist
          # (checked before the redirect, so we never create an empty file).
          if git fetch origin registry-snapshots 2>/dev/null \
            && git cat-file -e origin/registry-snapshots:data/registry-snapshots/latest.json 2>/dev/null; then
            git show origin/registry-snapshots:data/registry-snapshots/latest.json \
              > data/registry-snapshots/latest.json
            echo "Restored baseline from registry-snapshots branch."
          else
            echo "No baseline yet — first run (cold start, diff against nothing)."
          fi

      - name: Sweep registry and diff against baseline
        env:
          MALWAR_ANTHROPIC_API_KEY: ${{ secrets.MALWAR_ANTHROPIC_API_KEY }}
          # Full re-scan on the weekly cron or when manually requested;
          # incremental otherwise.
          IS_WEEKLY: ${{ github.event.schedule == '0 7 * * 0' }}
          DISPATCH_FULL: ${{ github.event.inputs.full }}
        run: |
          FULL=""
          if [ "$IS_WEEKLY" = "true" ] || [ "$DISPATCH_FULL" = "true" ]; then
            FULL="--full"
            echo "Mode: FULL re-scan (every skill)."
          else
            echo "Mode: incremental (only changed skills)."
          fi
          # ClawHub is rate-limited (~2 req/s), so a full ~6k-skill registry
          # can't be swept in one CI run. Cap scans per run; the overflow is
          # deferred and picked up on subsequent runs, so the baseline builds
          # up over a few days and then daily runs only touch what changed.
          malwar crawl monitor \
            --snapshot-dir data/registry-snapshots \
            --format json \
            --output data/registry-snapshots/latest-diff.json \
            --max-scans 1500 \
            $FULL

      - name: Publish snapshot to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Preserve the freshly generated snapshot files across the branch switch.
          tmp="$(mktemp -d)"
          cp -a data/registry-snapshots/. "$tmp/"

          # Move onto the data branch (create an orphan branch on the first run).
          if git rev-parse --verify origin/registry-snapshots >/dev/null 2>&1; then
            git checkout -B registry-snapshots origin/registry-snapshots
          else
            git checkout --orphan registry-snapshots
            git reset # unstage main's tree; commit only the snapshots below
          fi

          # Layer the fresh files on top of the branch's accumulated history.
          mkdir -p data/registry-snapshots
          cp -a "$tmp/." data/registry-snapshots/

          git add data/registry-snapshots
          if git diff --cached --quiet; then
            echo "No registry changes today — nothing to commit."
          else
            git commit -m "chore(monitor): registry snapshot $(date -u +%Y-%m-%d)"
            git push origin registry-snapshots
          fi
